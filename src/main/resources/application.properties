spring.application.name=alpheratz

spring.datasource.url=jdbc:postgresql://localhost:5432/alpheratz_db
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.websocket.max-text-message-buffer-size=10485760
spring.jackson.serialization.fail-on-empty-beans=false

server.port=8080

jwt.secret=alpheratz-super-secret-key-2024-must-be-at-least-32-chars
jwt.expiration=86400000